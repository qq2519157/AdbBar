name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm install

      - name: Generate Windows icon
        if: matrix.platform == 'windows-latest'
        run: |
          pip install Pillow
          python -c "
          from PIL import Image
          img = Image.open('src-tauri/icons/icon.png')
          icon_sizes = [(16,16), (32,32), (48,48), (64,64), (128,128), (256,256)]
          img.save('src-tauri/icons/icon.ico', format='ICO', sizes=icon_sizes)
          "
          $iconEntry = '    "icons/icon.ico",'
          $json = Get-Content src-tauri/tauri.conf.json -Raw
          $json = $json.Replace('"icons/icon.png"', "`"icons/icon.png`",$iconEntry")
          Set-Content src-tauri/tauri.conf.json $json

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'ADB Bar ${{ github.ref_name }}'
          releaseBody: 'See the assets to download this version.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
